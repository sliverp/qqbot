name: QQBot E2E Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

# 同一个 PR 只跑最新的一次
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E — OpenClaw ${{ matrix.openclaw-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # 在这里维护要测试的 OpenClaw 版本列表
        # 社区贡献者也可以通过 PR 修改此列表
        openclaw-version:
          - latest
          # - "1.20.0"    # 取消注释以添加更多版本
          # - "1.19.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (OpenClaw ${{ matrix.openclaw-version }})
        run: |
          docker build \
            --build-arg "OPENCLAW_VERSION=${{ matrix.openclaw-version }}" \
            -t "qqbot-e2e:${{ matrix.openclaw-version }}" \
            -f tests/Dockerfile .

      - name: Run E2E tests
        env:
          BOT1_APPID: ${{ secrets.BOT1_APPID }}
          BOT1_SECRET: ${{ secrets.BOT1_SECRET }}
          BOT1_TEST_OPENID: ${{ secrets.BOT1_TEST_OPENID }}
          BOT2_APPID: ${{ secrets.BOT2_APPID }}
          BOT2_SECRET: ${{ secrets.BOT2_SECRET }}
          BOT2_TEST_OPENID: ${{ secrets.BOT2_TEST_OPENID }}
          BOT1_TEST_GROUP_OPENID: ${{ secrets.BOT1_TEST_GROUP_OPENID }}
          BOT2_TEST_GROUP_OPENID: ${{ secrets.BOT2_TEST_GROUP_OPENID }}
        run: |
          mkdir -p tests/reports
          docker run --rm \
            -e BOT1_APPID \
            -e BOT1_SECRET \
            -e BOT1_TEST_OPENID \
            -e BOT2_APPID \
            -e BOT2_SECRET \
            -e BOT2_TEST_OPENID \
            -e BOT1_TEST_GROUP_OPENID \
            -e BOT2_TEST_GROUP_OPENID \
            -e "OPENCLAW_VERSION=${{ matrix.openclaw-version }}" \
            -v "${{ github.workspace }}/tests/reports:/workspace/qqbot/tests/reports" \
            "qqbot-e2e:${{ matrix.openclaw-version }}"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ matrix.openclaw-version }}
          path: tests/reports/
          retention-days: 30

      - name: Display test summary
        if: always()
        run: |
          echo "## E2E Test Results — OpenClaw ${{ matrix.openclaw-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          JSON_REPORT=$(ls -t tests/reports/report-*.json 2>/dev/null | head -1)
          if [ -n "$JSON_REPORT" ] && [ -f "$JSON_REPORT" ]; then
            TOTAL=$(jq '.summary.total' "$JSON_REPORT")
            PASSED=$(jq '.summary.passed' "$JSON_REPORT")
            FAILED=$(jq '.summary.failed' "$JSON_REPORT")
            SKIPPED=$(jq '.summary.skipped' "$JSON_REPORT")

            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⊘ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### Details" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            jq -r '.results[] | "\(.status | ascii_upcase)\t\(.test)\t\(.detail)"' "$JSON_REPORT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No JSON report found" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 构建验证（不需要 secrets） ──────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
